<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rimpang Digital Kreatif - Movie Photo Booth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
        }

        /* Custom Scrollbar for Themes */
        .theme-scroll::-webkit-scrollbar {
            height: 8px;
        }
        .theme-scroll::-webkit-scrollbar-track {
            background: #1e293b; 
            border-radius: 4px;
        }
        .theme-scroll::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        .theme-scroll::-webkit-scrollbar-thumb:hover {
            background: #f59e0b; 
        }

        .shutter-btn {
            transition: all 0.2s ease-in-out;
        }
        .shutter-btn:active {
            transform: scale(0.9);
        }

        .flash-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        
        .flash-animation {
            animation: flash 0.5s ease-out;
        }

        @keyframes flash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        #video-preview {
            transform: scaleX(-1); /* Mirror effect for webcam */
            object-fit: cover;
        }
        
        /* Mirror canvas when drawing unless it's text/overlay */
        .mirrored-canvas {
            transform: scaleX(-1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-orange-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-lg">
                    R
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-tight bg-clip-text text-transparent bg-gradient-to-r from-amber-400 to-orange-500">RIMPANG DIGITAL</h1>
                    <p class="text-xs text-slate-400 font-medium">Movie Photo Booth</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-4">
                <a href="https://rimpangdigital.com/" target="_blank" class="hidden sm:flex items-center gap-2 text-sm font-semibold text-slate-300 hover:text-amber-400 transition-colors">
                    <i class="fas fa-globe"></i> Website
                </a>
                <a href="https://wa.me/6281381378871" target="_blank" class="w-9 h-9 rounded-full bg-green-600/20 text-green-500 flex items-center justify-center hover:bg-green-600 hover:text-white transition-all">
                    <i class="fab fa-whatsapp text-lg"></i>
                </a>
                <a href="https://www.instagram.com/rimpang.digital/reels/?__d=1%2F" target="_blank" class="w-9 h-9 rounded-full bg-pink-600/20 text-pink-500 flex items-center justify-center hover:bg-gradient-to-tr hover:from-yellow-400 hover:via-pink-500 hover:to-purple-600 hover:text-white transition-all">
                    <i class="fab fa-instagram text-lg"></i>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-start p-4 w-full max-w-5xl mx-auto">
        
        <!-- Camera Container -->
        <div class="w-full relative rounded-2xl overflow-hidden bg-black shadow-2xl border-4 border-slate-800 aspect-video md:aspect-[16/9] flex items-center justify-center group">
            
            <!-- Video Element -->
            <video id="video-preview" autoplay playsinline class="w-full h-full object-cover transition-all duration-300"></video>
            
            <!-- Camera Status/Overlay UI -->
            <div id="camera-loading" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 z-10">
                <i class="fas fa-camera text-4xl text-slate-500 mb-4 animate-pulse"></i>
                <p class="text-slate-400 text-sm">Menghubungkan Kamera...</p>
                <button id="start-cam-btn" class="mt-4 px-6 py-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-full transition-colors hidden">
                    Izinkan Kamera
                </button>
            </div>

            <!-- Active Theme Badge -->
            <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 z-20">
                <span id="current-theme-label" class="text-sm font-bold text-amber-400">Pilih Tema Film</span>
            </div>

            <!-- Flash Effect -->
            <div id="flash-screen" class="flash-overlay"></div>
            
            <!-- Live Overlay Text (rendered dynamically in JS) -->
            <div id="live-overlay" class="absolute inset-0 pointer-events-none z-20 flex flex-col justify-between p-4 opacity-80">
                <!-- Filled by JS -->
            </div>
        </div>

        <!-- Theme Selector -->
        <div class="w-full mt-6">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3 px-2">Pilih Tema Film (Sesuaikan Gestur!)</h2>
            <div class="flex overflow-x-auto gap-3 pb-4 theme-scroll px-2" id="theme-container">
                <!-- Theme buttons generated via JS -->
            </div>
        </div>

        <!-- Capture Button -->
        <div class="mt-4 mb-8 flex flex-col items-center">
            <button id="capture-btn" class="shutter-btn relative w-20 h-20 rounded-full bg-slate-200 border-4 border-slate-400 flex items-center justify-center shadow-[0_0_20px_rgba(245,158,11,0.3)] disabled:opacity-50 disabled:cursor-not-allowed">
                <div class="w-16 h-16 rounded-full bg-amber-500 border-2 border-slate-200"></div>
            </button>
            <p class="mt-3 text-slate-400 text-sm font-medium">Ambil Foto</p>
        </div>

    </main>

    <!-- Result Modal (Hidden by default) -->
    <div id="result-modal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4">
        <div class="w-full max-w-4xl bg-slate-800 rounded-2xl shadow-2xl overflow-hidden border border-slate-700 flex flex-col">
            
            <!-- Modal Header -->
            <div class="flex justify-between items-center p-4 border-b border-slate-700">
                <h3 class="font-bold text-lg text-white"><i class="fas fa-image text-amber-500 mr-2"></i>Hasil Photo Booth</h3>
                <button id="close-modal-btn" class="text-slate-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <!-- Result Canvas/Image Area -->
            <div class="p-4 bg-black flex justify-center items-center relative">
                <!-- The actual canvas we draw to -->
                <canvas id="photo-canvas" class="max-w-full max-h-[60vh] object-contain rounded-lg shadow-lg"></canvas>
            </div>

            <!-- Export Actions -->
            <div class="p-6 bg-slate-800 flex flex-wrap justify-center gap-4">
                <button id="download-btn" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-all shadow-lg shadow-blue-900/50">
                    <i class="fas fa-download"></i> Simpan JPG
                </button>
                <button id="print-btn" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg transition-all shadow-lg shadow-emerald-900/50">
                    <i class="fas fa-print"></i> Print Langsung
                </button>
                <button id="retake-btn" class="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-lg transition-all">
                    <i class="fas fa-redo"></i> Foto Ulang
                </button>
            </div>
            
            <!-- Direct CTA to Website -->
            <div class="p-4 bg-slate-900 text-center border-t border-slate-700">
                <p class="text-sm text-slate-400 mb-2">Ingin buat aplikasi atau website seperti ini?</p>
                <a href="https://rimpangdigital.com/" target="_blank" class="inline-block text-amber-400 font-bold hover:text-amber-300 underline underline-offset-2">
                    Kunjungi Rimpang Digital Kreatif
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- 1. THEME CONFIGURATIONS ---
        const themes = [
            {
                id: 'normal',
                name: 'Original',
                icon: 'fa-user',
                color: 'bg-slate-700',
                cssFilter: 'none',
                overlayText: '',
                drawOverlay: (ctx, w, h) => {} 
            },
            {
                id: 'matrix',
                name: 'The Matrix',
                icon: 'fa-code',
                color: 'bg-green-700',
                cssFilter: 'sepia(100%) hue-rotate(80deg) saturate(300%) contrast(1.2)',
                overlayText: 'THE MATRIX',
                drawOverlay: (ctx, w, h) => {
                    // Digital rain simulation border
                    ctx.fillStyle = '#00ff00';
                    ctx.font = `bold ${Math.floor(w*0.04)}px monospace`;
                    ctx.fillText('0 1 0 1 1 0 1 0', w*0.05, h*0.1);
                    ctx.fillText('W A K E  U P', w*0.05, h*0.9);
                }
            },
            {
                id: 'starwars',
                name: 'Star Wars',
                icon: 'fa-space-shuttle',
                color: 'bg-blue-800',
                cssFilter: 'contrast(1.2) brightness(1.1)',
                overlayText: 'GALAXY FAR FAR AWAY',
                drawOverlay: (ctx, w, h) => {
                    // Cinematic letterbox & Light/Dark side border
                    ctx.fillStyle = 'rgba(0,0,0,0.8)';
                    ctx.fillRect(0, 0, w, h*0.08); // Top letterbox
                    ctx.fillRect(0, h*0.92, w, h*0.08); // Bottom letterbox
                    ctx.strokeStyle = '#00f'; // Jedi blue
                    ctx.lineWidth = 8;
                    ctx.strokeRect(w*0.02, h*0.1, w*0.45, h*0.8);
                    ctx.strokeStyle = '#f00'; // Sith red
                    ctx.strokeRect(w*0.53, h*0.1, w*0.45, h*0.8);
                    ctx.fillStyle = '#ffe81f'; // Star Wars Yellow
                    ctx.font = `bold ${Math.floor(w*0.03)}px Impact`;
                    ctx.textAlign = 'center';
                    ctx.fillText('MAY THE FORCE BE WITH YOU', w/2, h*0.06);
                }
            },
            {
                id: 'godfather',
                name: 'The Godfather',
                icon: 'fa-user-tie',
                color: 'bg-stone-800',
                cssFilter: 'grayscale(100%) contrast(1.5) brightness(0.8)',
                overlayText: 'THE DON',
                drawOverlay: (ctx, w, h) => {
                    // Vignette effect
                    const gradient = ctx.createRadialGradient(w/2, h/2, h*0.2, w/2, h/2, h*0.8);
                    gradient.addColorStop(0, 'rgba(0,0,0,0)');
                    gradient.addColorStop(1, 'rgba(0,0,0,0.8)');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, w, h);
                    
                    ctx.fillStyle = 'white';
                    ctx.font = `italic bold ${Math.floor(w*0.04)}px serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('"I\'m gonna make him an offer he can\'t refuse."', w/2, h*0.9);
                }
            },
            {
                id: 'harrypotter',
                name: 'Harry Potter',
                icon: 'fa-bolt',
                color: 'bg-yellow-800',
                cssFilter: 'sepia(40%) contrast(1.1) brightness(0.9)',
                overlayText: 'MAGIC SPELL',
                drawOverlay: (ctx, w, h) => {
                    ctx.strokeStyle = '#d4af37'; // Gold
                    ctx.lineWidth = 10;
                    ctx.strokeRect(10, 10, w-20, h-20);
                    ctx.font = `${Math.floor(w*0.06)}px Arial`;
                    ctx.fillText('⚡ 🧙‍♂️ 🦉', w/2, h*0.1);
                    ctx.fillStyle = '#d4af37';
                    ctx.font = `bold ${Math.floor(w*0.03)}px serif`;
                    ctx.fillText('EXPECTO PATRONUM', w/2, h*0.92);
                }
            },
            {
                id: 'jurassic',
                name: 'Jurassic Park',
                icon: 'fa-paw',
                color: 'bg-green-900',
                cssFilter: 'sepia(50%) hue-rotate(50deg) contrast(1.2)',
                overlayText: 'DINO ZONE',
                drawOverlay: (ctx, w, h) => {
                    ctx.strokeStyle = '#4a5d23'; // Camo green
                    ctx.lineWidth = 20;
                    ctx.strokeRect(0, 0, w, h);
                    ctx.fillStyle = '#eab308'; // Yellow text
                    ctx.font = `bold ${Math.floor(w*0.04)}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('T-REX INCOMING', w/2, h*0.08);
                    ctx.font = `${Math.floor(w*0.08)}px Arial`;
                    ctx.fillText('🦖 🌴 🦕', w/2, h*0.9);
                }
            },
            {
                id: 'avengers',
                name: 'Avengers',
                icon: 'fa-shield-alt',
                color: 'bg-red-700',
                cssFilter: 'contrast(1.3) saturate(1.5)',
                overlayText: 'ASSEMBLE',
                drawOverlay: (ctx, w, h) => {
                    ctx.fillStyle = '#e23636'; // Marvel Red
                    ctx.fillRect(w*0.02, h*0.02, w*0.2, h*0.08);
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${Math.floor(w*0.04)}px sans-serif`;
                    ctx.textAlign = 'left';
                    ctx.fillText('MARVEL', w*0.03, h*0.075);
                    ctx.font = `${Math.floor(w*0.06)}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.fillText('🦸‍♂️ ⚡ 🛡️ 🔨', w/2, h*0.92);
                }
            },
            {
                id: 'avatar',
                name: 'Avatar',
                icon: 'fa-leaf',
                color: 'bg-cyan-700',
                cssFilter: 'hue-rotate(-120deg) saturate(2) brightness(1.2)',
                overlayText: 'PANDORA',
                drawOverlay: (ctx, w, h) => {
                    // Glowing dots overlay
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
                    for(let i=0; i<30; i++) {
                        ctx.beginPath();
                        ctx.arc(Math.random()*w, Math.random()*h, Math.random()*5+2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.fillStyle = '#a5f3fc';
                    ctx.font = `italic ${Math.floor(w*0.04)}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('WELCOME TO PANDORA', w/2, h*0.9);
                }
            },
            {
                id: 'terminator',
                name: 'Terminator',
                icon: 'fa-robot',
                color: 'bg-red-900',
                cssFilter: 'sepia(100%) hue-rotate(-50deg) saturate(500%) contrast(2)',
                overlayText: 'TARGET ACQUIRED',
                drawOverlay: (ctx, w, h) => {
                    // HUD UI
                    ctx.strokeStyle = 'rgba(255,0,0,0.7)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(w*0.1, h*0.1, w*0.8, h*0.8);
                    
                    ctx.beginPath();
                    ctx.arc(w/2, h/2, h*0.2, 0, Math.PI*2);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(w/2, h*0.2); ctx.lineTo(w/2, h*0.8);
                    ctx.moveTo(w*0.2, h/2); ctx.lineTo(w*0.8, h/2);
                    ctx.stroke();

                    ctx.fillStyle = 'red';
                    ctx.font = `bold ${Math.floor(w*0.03)}px monospace`;
                    ctx.textAlign = 'left';
                    ctx.fillText('SYS_OVERRIDE: 100%', w*0.12, h*0.15);
                    ctx.fillText('I\'LL BE BACK.', w*0.12, h*0.85);
                }
            },
            {
                id: 'titanic',
                name: 'Titanic',
                icon: 'fa-ship',
                color: 'bg-sky-800',
                cssFilter: 'sepia(50%) hue-rotate(180deg) contrast(0.9) brightness(1.1)',
                overlayText: 'KING OF THE WORLD',
                drawOverlay: (ctx, w, h) => {
                    // Soft blue vignette
                    const gradient = ctx.createLinearGradient(0, 0, 0, h);
                    gradient.addColorStop(0, 'rgba(14, 165, 233, 0.2)');
                    gradient.addColorStop(1, 'rgba(2, 132, 199, 0.5)');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, w, h);
                    
                    ctx.fillStyle = 'white';
                    ctx.font = `italic ${Math.floor(w*0.04)}px serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('🛳️ I\'m flying, Jack! 🌊', w/2, h*0.9);
                }
            },
            {
                id: 'joker',
                name: 'Joker',
                icon: 'fa-masks-theater',
                color: 'bg-purple-800',
                cssFilter: 'sepia(40%) hue-rotate(70deg) contrast(1.4) saturate(1.2)',
                overlayText: 'SMILE',
                drawOverlay: (ctx, w, h) => {
                    ctx.fillStyle = '#facc15'; // Yellow text
                    ctx.font = `bold ${Math.floor(w*0.05)}px Impact`;
                    ctx.textAlign = 'center';
                    ctx.fillText('PUT ON A HAPPY FACE', w/2, h*0.1);
                    ctx.font = `${Math.floor(w*0.1)}px Arial`;
                    ctx.fillText('🤡', w/2, h*0.9);
                }
            }
        ];

        let currentTheme = themes[0];
        let stream = null;

        // --- 2. DOM ELEMENTS ---
        const video = document.getElementById('video-preview');
        const canvas = document.getElementById('photo-canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('capture-btn');
        const themeContainer = document.getElementById('theme-container');
        const currentThemeLabel = document.getElementById('current-theme-label');
        const flashScreen = document.getElementById('flash-screen');
        const resultModal = document.getElementById('result-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const downloadBtn = document.getElementById('download-btn');
        const printBtn = document.getElementById('print-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const loadingOverlay = document.getElementById('camera-loading');
        const startCamBtn = document.getElementById('start-cam-btn');

        // --- 3. CAMERA SETUP ---
        async function initCamera() {
            try {
                // Determine resolution based on device capability, default to 720p HD
                const constraints = {
                    video: { 
                        facingMode: 'user', // Selfie cam
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    loadingOverlay.classList.add('hidden');
                    captureBtn.disabled = false;
                };

            } catch (err) {
                console.error("Camera access error:", err);
                loadingOverlay.innerHTML = `
                    <i class="fas fa-exclamation-triangle text-4xl text-amber-500 mb-4"></i>
                    <p class="text-white text-center px-4">Tidak dapat mengakses kamera.<br>Harap izinkan akses kamera di browser Anda.</p>
                `;
                startCamBtn.classList.remove('hidden');
                startCamBtn.onclick = initCamera; // Try again
            }
        }

        // --- 4. THEME UI SETUP ---
        function renderThemeButtons() {
            themes.forEach((theme) => {
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 flex flex-col items-center justify-center w-24 h-24 rounded-xl border-2 transition-all ${theme.id === currentTheme.id ? 'border-amber-400 scale-105' : 'border-slate-700 hover:border-slate-500'} bg-slate-800`;
                btn.innerHTML = `
                    <div class="w-10 h-10 rounded-full ${theme.color} flex items-center justify-center text-white mb-2 shadow-inner">
                        <i class="fas ${theme.icon}"></i>
                    </div>
                    <span class="text-xs font-bold text-center px-1 text-slate-200 line-clamp-1">${theme.name}</span>
                `;
                
                btn.onclick = () => selectTheme(theme, btn);
                themeContainer.appendChild(btn);
            });
        }

        function selectTheme(theme, btnElement) {
            currentTheme = theme;
            
            // Update UI
            document.querySelectorAll('#theme-container button').forEach(b => {
                b.classList.remove('border-amber-400', 'scale-105');
                b.classList.add('border-slate-700');
            });
            btnElement.classList.add('border-amber-400', 'scale-105');
            btnElement.classList.remove('border-slate-700');

            currentThemeLabel.innerText = `Tema: ${theme.name}`;
            
            // Apply live CSS filter to video
            video.style.filter = theme.cssFilter;
        }

        // --- 5. CAPTURE LOGIC ---
        function takePhoto() {
            if (!stream) return;

            // Flash effect
            flashScreen.classList.remove('flash-animation');
            void flashScreen.offsetWidth; // trigger reflow
            flashScreen.classList.add('flash-animation');

            // Play sound effect (synthesized to avoid external files)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);

            // Set canvas size to match video resolution
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;

            const w = canvas.width;
            const h = canvas.height;

            // Clear canvas
            ctx.clearRect(0, 0, w, h);

            // Draw Video Frame 
            // Handle mirroring for the selfie cam so the saved image looks like what they saw
            ctx.save();
            ctx.translate(w, 0);
            ctx.scale(-1, 1);
            
            // Apply current theme filter to the canvas context before drawing
            ctx.filter = currentTheme.cssFilter;
            ctx.drawImage(video, 0, 0, w, h);
            ctx.restore(); // Restore to normal orientation for text/overlays
            
            // Re-apply filter for overlays if needed, or remove it so overlays are clean
            ctx.filter = 'none';

            // Draw Theme Specific Overlays
            currentTheme.drawOverlay(ctx, w, h);

            // Draw Mandatory Watermark: RIMPANG DIGITAL KREATIF
            drawWatermark(w, h);

            // Show Modal
            setTimeout(() => {
                resultModal.classList.remove('hidden');
                resultModal.classList.add('flex');
            }, 300); // slight delay to let flash finish
        }

        function drawWatermark(w, h) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            const padding = w * 0.015;
            const fontSize = Math.max(16, Math.floor(w * 0.025));
            ctx.font = `bold ${fontSize}px Inter, sans-serif`;
            
            const text = "RIMPANG DIGITAL KREATIF";
            const metrics = ctx.measureText(text);
            const textWidth = metrics.width;
            
            const x = w - textWidth - (padding * 2) - 20;
            const y = h - fontSize - (padding * 2) - 20;

            // Draw background pill
            ctx.beginPath();
            ctx.roundRect(x, y, textWidth + (padding * 2), fontSize + (padding * 2), 10);
            ctx.fill();

            // Draw Text
            ctx.fillStyle = '#f59e0b'; // Amber 500
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(text, x + padding, y + padding);
        }

        // --- 6. EXPORT LOGIC ---
        function downloadImage() {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9); // High quality JPG
            const link = document.createElement('a');
            link.download = `Rimpang_PhotoBooth_${currentTheme.name.replace(/\s+/g, '_')}_${Date.now()}.jpg`;
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function printImage() {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            
            // Create a hidden iframe for printing to avoid popup blockers and UI disruption
            const printIframe = document.createElement('iframe');
            printIframe.style.position = 'absolute';
            printIframe.style.width = '0';
            printIframe.style.height = '0';
            printIframe.style.border = 'none';
            document.body.appendChild(printIframe);

            const printDocument = printIframe.contentWindow.document;
            printDocument.open();
            printDocument.write(`
                <html>
                <head>
                    <title>Print Photo - Rimpang Digital</title>
                    <style>
                        @page { margin: 0; size: auto; }
                        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: white; }
                        img { max-width: 100%; max-height: 100vh; object-fit: contain; }
                    </style>
                </head>
                <body>
                    <img src="${dataUrl}" onload="window.print(); window.parent.document.body.removeChild(window.frameElement);" />
                </body>
                </html>
            `);
            printDocument.close();
        }

        // --- 7. EVENT LISTENERS & INIT ---
        captureBtn.addEventListener('click', takePhoto);
        closeModalBtn.addEventListener('click', () => {
            resultModal.classList.add('hidden');
            resultModal.classList.remove('flex');
        });
        retakeBtn.addEventListener('click', () => {
            resultModal.classList.add('hidden');
            resultModal.classList.remove('flex');
        });
        downloadBtn.addEventListener('click', downloadImage);
        printBtn.addEventListener('click', printImage);

        // Run on load
        window.onload = () => {
            renderThemeButtons();
            
            // Set initial button state
            const firstBtn = themeContainer.querySelector('button');
            if(firstBtn) {
                firstBtn.classList.add('border-amber-400', 'scale-105');
                firstBtn.classList.remove('border-slate-700');
            }

            initCamera();
        };

    </script>
</body>
</html>
